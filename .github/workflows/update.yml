name: Weekly Anime Rank Update

on:
  schedule:
    - cron: "0 0 * * 1"   # 매주 월요일 00:00 UTC (= 월 09:00 KST)
  workflow_dispatch: {}    # 수동 실행 버튼

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r build/requirements.txt

      - name: Fetch & build data
        run: python build/fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data.json site/history/
          git commit -m "data: weekly update $(date -u +%Y-%m-%d)" || { echo "no changes"; exit 0; }
          # 원격이 그 사이 움직였어도 깨지지 않도록 rebase 후 푸시 + 재시도 (non-fast-forward 방지)
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push attempt $i failed, retrying..."; sleep 5
          done
          echo "push failed after 3 attempts"; exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
